  /* ===== BOOK ===== */
  viewBook(view) {
    const myBookings = State.bookings.filter(b => b.owner === State.user.email);
    const todayBookings = State.bookings.filter(b => b.date === ymd(new Date()));

    view.appendChild(
      el('section', { class: 'hero' },
        el('div', { class: 'hero-content' },
          el('div', { class: 'eyebrow' }, `${CONFIG.CLUB_CITY.toUpperCase()} · ${fmtDate(new Date(), { year: 'numeric' }).toUpperCase()}`),
          el('h1', { html: `Welcome back, <em>${sanitize(State.user.name.split(' ')[0])}</em>.` }),
          el('div', { class: 'hero-meta' }, `${State.courts.length} courts · ${todayBookings.length} sessions today`),
          el('div', { class: 'hero-cta' },
            el('button', { class: 'btn btn-primary', onClick: () => Render.bookingSheet(), html: ICONS.plus + '<span>Book a court</span>' }),
            el('button', { class: 'btn btn-ghost', onClick: () => { State.route = 'calendar'; Render.current(); } }, 'View schedule'),
          ),
        )
      )
    );

    const paid = State.payments.filter(p => p.owner === State.user.email && p.status === 'paid').length;
    const pending = State.payments.filter(p => p.owner === State.user.email && p.status === 'pending').length;
    view.appendChild(
      el('div', { class: 'stats' },
        el('div', { class: 'stat' },
          el('div', { class: 'stat-value' }, String(myBookings.length)),
          el('div', { class: 'stat-label' }, 'Your bookings'),
        ),
        el('div', { class: 'stat' },
          el('div', { class: 'stat-value' }, String(paid)),
          el('div', { class: 'stat-label' }, 'Paid sessions'),
        ),
        el('div', { class: 'stat' },
          el('div', { class: 'stat-value' }, String(pending)),
          el('div', { class: 'stat-label' }, 'Pending'),
        ),
      )
    );

    view.appendChild(el('div', { class: 'section-header' },
      el('h2', {}, 'Our courts'),
      el('span', { class: 'link' }, `${fmtMoney(CONFIG.PRICE_PER_HOUR)}/hr`),
    ));

    const courtsList = el('div', { class: 'stack' });
    State.courts.forEach(c => {
      const todayCount = State.bookings.filter(b => b.courtId === c.id && b.date === ymd(new Date())).length;
      courtsList.appendChild(
        el('div', { class: 'card court-card', onClick: () => Render.bookingSheet({ courtId: c.id }) },
          el('div', { class: 'court-mini' }),
          el('div', { class: 'court-info' },
            el('h3', {}, c.name),
            el('p', {}, c.surface),
          ),
          el('div', { class: 'court-meta' },
            el('span', { class: `chip ${todayCount >= 6 ? 'warn' : 'success'}` },
              el('span', { class: 'chip-dot' }),
              `${todayCount}/${CONFIG.TIME_SLOTS.length}`
            ),
          ),
        )
      );
    });
    view.appendChild(courtsList);

    view.appendChild(el('div', { class: 'section-header' },
      el('h2', {}, 'Today at a glance'),
      el('span', { class: 'link' }, fmtDate(new Date(), { year: undefined })),
    ));
    const todayCard = el('div', { class: 'card' });
    if (todayBookings.length === 0) {
      todayCard.appendChild(this.emptyState('No bookings yet today. Be the first on the court!'));
    } else {
      todayBookings.sort((a, b) => a.time.localeCompare(b.time)).forEach(b => {
        todayCard.appendChild(this.bookingItem(b));
      });
    }
    view.appendChild(todayCard);
  },

  bookingItem(b) {
    const isMine = b.owner === State.user.email;
    const pmt = State.payments.find(p => p.bookingId === b.id);
    return el('div', { class: 'booking-item' },
      el('div', { class: 'booking-time' }, b.time),
      el('div', { class: 'booking-meta' },
        el('h4', {}, b.courtName),
        el('p', {}, `${sanitize(b.players || b.owner)} · ${b.duration || 1}hr`),
      ),
      el('div', { class: 'booking-actions' },
        pmt ? el('span', { class: 'chip ' + (pmt.status === 'paid' ? 'success' : 'warn') }, pmt.status) : null,
        isMine ? el('button', { class: 'icon-btn', 'aria-label': 'Cancel', onClick: () => Render.confirmCancel(b), html: ICONS.close }) : null,
      ),
    );
  },

  emptyState(msg) {
    return el('div', { class: 'empty' },
      el('div', { html: ICONS.paddle }),
      el('p', {}, msg),
    );
  },

  bookingSheet(prefill = {}) {
    const today = ymd(new Date());
    let date = prefill.date || today;
    let courtId = prefill.courtId || State.courts[0]?.id;
    let time = prefill.time || null;
    let repeat = false;
    let duration = 1;
    let players = State.user.name;

    const body = el('div', {});

    const courtSelect = el('select', { class: 'select' },
      ...State.courts.map(c => el('option', { value: c.id, selected: c.id === courtId ? '' : null }, c.name))
    );
    courtSelect.onchange = () => { courtId = courtSelect.value; renderSlots(); };

    const dateInput = el('input', { class: 'input', type: 'date', value: date, min: today });
    dateInput.onchange = () => { date = dateInput.value; renderSlots(); };

    const playersInput = el('input', { class: 'input', value: players, placeholder: 'Player names (comma separated)' });
    playersInput.oninput = () => { players = playersInput.value; };

    const durationSelect = el('select', { class: 'select' },
      el('option', { value: '1' }, '1 hour'),
      el('option', { value: '2' }, '2 hours'),
    );
    durationSelect.onchange = () => { duration = +durationSelect.value; renderSlots(); };

    const repeatSwitch = el('div', { class: 'switch', onClick: (e) => {
      repeat = !repeat;
      e.currentTarget.classList.toggle('on', repeat);
    }});

    const slotsWrap = el('div', { class: 'timeslots' });
    const summaryRow = el('div', { class: 'card', style: { marginTop: '0.75rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
      el('div', {},
        el('div', { class: 'eyebrow' }, 'Total'),
        el('div', { style: { fontSize: '1.4rem', fontWeight: '700', fontFamily: 'var(--font-display)' } }, fmtMoney(CONFIG.PRICE_PER_HOUR * duration)),
      ),
      el('div', { style: { textAlign: 'right' } },
        el('div', { class: 'eyebrow' }, 'Includes'),
        el('div', { style: { fontSize: '0.85rem' } }, 'Court · balls · towels'),
      ),
    );

    function renderSlots() {
      slotsWrap.innerHTML = '';
      const taken = new Set(
        State.bookings.filter(b => b.courtId === courtId && b.date === date).map(b => b.time)
      );
      CONFIG.TIME_SLOTS.forEach(t => {
        const isBooked = taken.has(t);
        const slot = el('button', {
          class: 'timeslot ' + (isBooked ? 'booked' : (time === t ? 'selected' : 'available')),
          disabled: isBooked ? '' : null,
          onClick: () => { if (isBooked) return; time = t; renderSlots(); }
        }, t);
        slotsWrap.appendChild(slot);
      });
    }
    renderSlots();

    body.append(
      el('div', { class: 'field' }, el('label', {}, 'Court'), courtSelect),
      el('div', { class: 'grid-2' },
        el('div', { class: 'field' }, el('label', {}, 'Date'), dateInput),
        el('div', { class: 'field' }, el('label', {}, 'Duration'), durationSelect),
      ),
      el('div', { class: 'field' }, el('label', {}, 'Available time slots'), slotsWrap),
      el('div', { class: 'field' }, el('label', {}, 'Players'), playersInput),
      el('div', { class: 'row' },
        el('div', { class: 'left' },
          el('strong', {}, 'Repeat weekly'),
          el('small', {}, 'Same court, same time, next 4 weeks'),
        ),
        repeatSwitch,
      ),
      summaryRow,
    );

    Modal.open({
      title: 'Book a court',
      body,
      actions: [{
        label: 'Confirm booking', class: 'btn-primary',
        onClick: async (close) => {
          if (!time) { Toast.show({ title: 'Pick a time first', type: 'warn' }); return; }
          const court = State.courts.find(c => c.id === courtId);
          const price = CONFIG.PRICE_PER_HOUR * duration;
          const datesToBook = repeat
            ? Array.from({ length: 4 }, (_, i) => { const d = new Date(date); d.setDate(d.getDate() + i * 7); return ymd(d); })
            : [date];

          const createdBookings = [];
          try {
            for (const d of datesToBook) {
              const booking = await API.call('createBooking', {
                courtId, courtName: court.name, date: d, time, duration, players, price,
              });
              if (!booking || !booking.id) {
                throw new Error('Backend did not return a booking record');
              }
              createdBookings.push(booking);
              State.bookings.push(booking);
              Notify.scheduleReminder(booking);
            }
            Toast.show({ title: `Booked ${court.name}`, msg: `${fmtDate(date)} at ${time}${repeat ? ' (×4 weeks)' : ''}`, type: 'success' });
            Notify.push({ title: 'Booking confirmed', body: `${court.name} on ${fmtDate(date)} at ${time}. Payment ${fmtMoney(price)} pending.` });
            close();
            await loadAll();
            Render.current();
          } catch (err) {
            // Roll back optimistic state for any bookings that did succeed before the failure
            for (const b of createdBookings) {
              State.bookings = State.bookings.filter(x => x.id !== b.id);
            }
            Toast.show({
              title: 'Booking failed',
              msg: err.message || 'Could not save to the server. Please try again.',
              type: 'danger',
            });
            console.error('[createBooking]', err);
          }
        }
      }]
    });
  },

  confirmCancel(b) {
    Modal.open({
      title: 'Cancel booking?',
      body: el('p', { style: { color: 'var(--fg-soft)' } },
        `${b.courtName} · ${fmtDate(b.date)} at ${b.time}. Refunds processed within 24 hours.`),
      actions: [
        { label: 'Cancel booking', class: 'btn-accent', onClick: async (close) => {
          await API.call('cancelBooking', { id: b.id });
          State.bookings = State.bookings.filter(x => x.id !== b.id);
          Toast.show({ title: 'Booking cancelled', type: 'info' });
          close(); Render.current();
        }},
        { label: 'Keep it', class: 'btn-ghost', onClick: (close) => close() },
      ],
    });
  },

  /* ===== CALENDAR ===== */
  viewCalendar(view) {
    const cursor = State.calCursor;
    const year = cursor.getFullYear();
    const month = cursor.getMonth();
    const first = new Date(year, month, 1);
    const startOffset = first.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const header = el('div', { class: 'cal-header' },
      el('div', { class: 'cal-title' }, cursor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })),
      el('div', { class: 'cal-nav' },
        el('button', { class: 'icon-btn', 'aria-label': 'Prev', html: ICONS.back, onClick: () => {
          State.calCursor = new Date(year, month - 1, 1); Render.current();
        }}),
        el('button', { class: 'icon-btn', 'aria-label': 'Today', html: ICONS.refresh, onClick: () => {
          State.calCursor = new Date(); State.selectedDate = new Date(); Render.current();
        }}),
        el('button', { class: 'icon-btn', 'aria-label': 'Next', html: ICONS.forward, onClick: () => {
          State.calCursor = new Date(year, month + 1, 1); Render.current();
        }}),
      ),
    );

    const grid = el('div', { class: 'cal-grid' });
    ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => grid.appendChild(el('div', { class: 'cal-dow' }, d)));

    const prevDays = new Date(year, month, 0).getDate();
    for (let i = startOffset - 1; i >= 0; i--) {
      const d = new Date(year, month - 1, prevDays - i);
      grid.appendChild(this.calDayNode(d, true));
    }
    for (let d = 1; d <= daysInMonth; d++) {
      grid.appendChild(this.calDayNode(new Date(year, month, d), false));
    }
    const trailing = 42 - (startOffset + daysInMonth);
    for (let i = 1; i <= trailing; i++) {
      grid.appendChild(this.calDayNode(new Date(year, month + 1, i), true));
    }

    view.appendChild(el('div', { class: 'card' }, header, grid));

    const selDate = ymd(State.selectedDate);
    const dayBookings = State.bookings.filter(b => b.date === selDate).sort((a,b) => a.time.localeCompare(b.time));

    view.appendChild(el('div', { class: 'section-header' },
      el('h2', {}, fmtDate(State.selectedDate, { year: undefined })),
      el('div', { style: { display: 'flex', gap: '0.5rem' } },
        el('button', { class: 'icon-btn', 'aria-label': 'Export iCal', html: ICONS.download, onClick: () => exportICal(dayBookings, fmtDate(State.selectedDate)) }),
        el('button', { class: 'btn btn-sm btn-primary', onClick: () => Render.bookingSheet({ date: selDate }) }, '+ Book'),
      ),
    ));

    const dayCard = el('div', { class: 'card' });
    if (dayBookings.length === 0) {
      dayCard.appendChild(this.emptyState('Open court. Be the first to book.'));
    } else {
      dayBookings.forEach(b => dayCard.appendChild(this.bookingItem(b)));
    }
    view.appendChild(dayCard);

    view.appendChild(el('div', { style: { marginTop: '1rem', display: 'flex', gap: '0.5rem', flexWrap: 'wrap' } },
      el('button', { class: 'btn btn-secondary btn-sm', html: ICONS.download + '<span>Export month (.ics)</span>',
        onClick: () => exportICal(State.bookings.filter(b => b.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)), `${year}-${month+1}`) }),
    ));
  },

  calDayNode(d, otherMonth) {
    const key = ymd(d);
    const isToday = key === ymd(new Date());
    const isSel = key === ymd(State.selectedDate);
    const has = State.bookings.some(b => b.date === key);
    return el('button', {
      class: 'cal-day' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '') + (isSel ? ' selected' : ''),
      onClick: () => { State.selectedDate = d; State.calCursor = d; Render.current(); haptic(4); },
    },
      el('span', { class: 'cal-day-num' }, String(d.getDate())),
      has ? el('span', { class: 'cal-day-dot' }) : null,
    );
  },

  /* ===== SCORES ===== */
  viewScores(view) {
    const m = State.currentMatch;

    if (!m) {
      view.appendChild(el('div', { class: 'section-header' },
        el('h2', {}, 'Live scoring'),
        el('span', { class: 'chip ' + (State.bleConnected ? 'success' : '') },
          el('span', { class: 'chip-dot' }), State.bleConnected ? 'BLE paired' : 'BLE off',
        ),
      ));
      view.appendChild(el('div', { class: 'card feature' },
        el('div', { style: { position: 'relative', zIndex: 1 } },
          el('div', { class: 'eyebrow', style: { color: 'var(--brass-soft)' } }, 'NEW MATCH'),
          el('h2', { style: { color: 'var(--cream)', margin: '0.5rem 0 0.4rem' } }, 'Start a match'),
          el('p', { style: { opacity: 0.85, fontSize: '0.92rem', marginBottom: '1.2rem' } }, 'Singles or doubles, traditional or rally scoring. Auto-synced to the live display.'),
          el('button', { class: 'btn btn-primary', style: { background: 'var(--brass)', color: 'var(--court-green-deep)' },
            html: ICONS.plus + '<span>New match</span>', onClick: () => Render.newMatchSheet() }),
        )
      ));

      view.appendChild(el('div', { class: 'section-header' }, el('h2', {}, 'Recent matches')));
      const list = el('div', { class: 'stack' });
      const sorted = [...State.scores].sort((a,b) => (b.startedAt||0) - (a.startedAt||0)).slice(0, 6);
      if (!sorted.length) list.appendChild(el('div', { class: 'card' }, this.emptyState('No matches yet. Start your first one above.')));
      sorted.forEach(s => {
        const isSeries = s.matchType && s.matchType !== 'single';
        const sA = s.teamA.setsWon || 0;
        const sB = s.teamB.setsWon || 0;
        const mainScore = isSeries ? `${sA}–${sB}` : `${s.teamA.score}–${s.teamB.score}`;
        const setSummary = isSeries && Array.isArray(s.sets) && s.sets.length
          ? s.sets.map(x => `${x.a}–${x.b}`).join(' · ')
          : '';
        const typeLabel = s.matchType === 'bo5' ? 'BO5' : (s.matchType === 'bo3' ? 'BO3' : '');
        list.appendChild(el('div', { class: 'card', style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
          el('div', { style: { flex: 1, minWidth: 0 } },
            el('strong', {}, `${s.teamA.name} vs ${s.teamB.name}`),
            el('div', { style: { fontSize: '0.8rem', color: 'var(--fg-mute)' } },
              `${s.courtName || 'No court'} · ${new Date(s.startedAt).toLocaleDateString()}${typeLabel ? ' · ' + typeLabel : ''}`),
            setSummary ? el('div', { style: { fontSize: '0.75rem', color: 'var(--fg-mute)', fontFamily: 'var(--font-mono)', marginTop: '2px' } }, setSummary) : null,
          ),
          el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '1.4rem', fontWeight: 600, color: 'var(--accent)', textAlign: 'right' } },
            mainScore,
            isSeries ? el('div', { style: { fontSize: '0.7rem', color: 'var(--fg-mute)', textTransform: 'uppercase', letterSpacing: '0.08em', marginTop: '2px' } }, 'sets') : null,
          ),
        ));
      });
      view.appendChild(list);
      return;
    }

    const slotCount = m.format === 'doubles' ? 2 : 1;
    const initialsFor = (t, idx) => {
      const players = (t.players || '').split(/[,/&]| and /).map(s => s.trim()).filter(Boolean);
      return (players[idx] || t.name || '?').charAt(0).toUpperCase();
    };
    const teamCard = (t, side) => {
      const photos = Array.isArray(t.photos) ? t.photos : [];
      const avatars = [];
      for (let i = 0; i < slotCount; i++) {
        const photo = photos[i];
        avatars.push(el('button', {
          class: 'team-avatar' + (photo ? '' : ' empty'),
          'aria-label': photo ? `Change ${t.name} player ${i+1} photo` : `Add ${t.name} player ${i+1} photo`,
          onClick: () => Render.photoPickerSheet({
            title: slotCount > 1 ? `${t.name} · Player ${i+1}` : t.name,
            current: photo,
            onCapture: (dataUrl) => Scoring.setTeamPhoto(side, i, dataUrl),
          }),
        },
          photo
            ? el('img', { src: photo, alt: '' })
            : el('span', { html: ICONS.camera }),
        ));
      }
      // Set pips below the score
      const totalSets = Scoring.totalSets(m.matchType);
      const teamSetsWon = t.setsWon || 0;
      const pips = [];
      if (m.matchType !== 'single') {
        for (let i = 0; i < totalSets; i++) {
          pips.push(el('div', { class: 'set-pip' + (i < teamSetsWon ? ' won' : '') }));
        }
      }
      return el('div', { class: 'score-team' + (m.serving === side ? ' serving' : '') },
        el('div', { class: 'team-avatars' }, ...avatars),
        el('div', { class: 'team-info' },
          el('div', { class: 'team-name' }, t.name),
          el('div', { class: 'team-players' }, t.players),
        ),
        el('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'flex-end' } },
          el('div', { class: 'team-score' }, String(t.score)),
          pips.length ? el('div', { class: 'set-pips' }, ...pips) : null,
        ),
      );
    };

    const matchTypeLabel = m.matchType === 'bo5' ? 'Best of 5'
      : m.matchType === 'bo3' ? 'Best of 3'
      : 'Single match';
    const seriesPart = m.matchType !== 'single'
      ? ` · Set ${m.currentSet} · Series ${m.teamA.setsWon}–${m.teamB.setsWon}`
      : '';

    const scoreboardChildren = [
      el('div', { class: 'score-teams' }, teamCard(m.teamA, 'A'), teamCard(m.teamB, 'B')),
      el('div', { class: 'score-meta' },
        el('span', {}, `${m.format} · to ${m.target}`),
        el('span', {}, `Serving: ${m.serving === 'A' ? m.teamA.name : m.teamB.name}${m.format === 'doubles' ? ' · #' + m[`team${m.serving}`].serverNum : ''}`),
        el('span', {}, m.scoring),
      ),
    ];

    // Set-by-set history (only when matchType is bo3/bo5)
    if (m.matchType !== 'single') {
      const setRows = [
        el('div', { class: 'set-row', style: { borderBottom: '1px solid rgba(255,255,255,0.08)', paddingBottom: '4px', marginBottom: '2px' } },
          el('div', { class: 'set-label' }, matchTypeLabel),
          el('div', { class: 'set-cell', style: { textAlign: 'right', fontSize: '0.7rem', textTransform: 'uppercase', letterSpacing: '0.08em', opacity: 0.7 } }, m.teamA.name.slice(0, 10)),
          el('div', { class: 'set-cell', style: { textAlign: 'right', fontSize: '0.7rem', textTransform: 'uppercase', letterSpacing: '0.08em', opacity: 0.7 } }, m.teamB.name.slice(0, 10)),
        ),
      ];
      m.sets.forEach((s, i) => {
        setRows.push(el('div', { class: 'set-row' },
          el('div', { class: 'set-label' }, `Set ${i + 1}`),
          el('div', { class: 'set-cell' + (s.winner === 'A' ? ' won' : ' lost'), style: { textAlign: 'right' } }, String(s.a)),
          el('div', { class: 'set-cell' + (s.winner === 'B' ? ' won' : ' lost'), style: { textAlign: 'right' } }, String(s.b)),
        ));
      });
      if (!m.winner) {
        setRows.push(el('div', { class: 'set-row current' },
          el('div', { class: 'set-label' }, `Set ${m.currentSet} · live`),
          el('div', { class: 'set-cell', style: { textAlign: 'right' } }, String(m.teamA.score)),
          el('div', { class: 'set-cell', style: { textAlign: 'right' } }, String(m.teamB.score)),
        ));
      }
      scoreboardChildren.push(el('div', { class: 'set-history' }, ...setRows));
    }

    view.appendChild(el('div', { class: 'scoreboard' }, ...scoreboardChildren));

    if (m.winner) {
      const finalLabel = m.matchType === 'single'
        ? `Final ${m.sets[0] ? m.sets[0].a : m.teamA.score}–${m.sets[0] ? m.sets[0].b : m.teamB.score}`
        : `Sets ${m.teamA.setsWon}–${m.teamB.setsWon} · ${m.sets.map(s => `${s.a}–${s.b}`).join(', ')}`;
      view.appendChild(el('div', { class: 'card', style: { textAlign: 'center', background: 'color-mix(in srgb, var(--brass) 14%, var(--bg-elev))' } },
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '1.5rem', fontWeight: 600 } }, `🏆 ${m[`team${m.winner}`].name} won`),
        el('p', { style: { color: 'var(--fg-soft)', marginTop: '0.3rem' } }, finalLabel),
        el('div', { style: { display: 'flex', gap: '0.5rem', justifyContent: 'center', marginTop: '1rem' } },
          el('button', { class: 'btn btn-primary', onClick: () => { State.currentMatch = null; Scoring.save(); Render.current(); } }, 'Start new match'),
        )
      ));
    } else {
      view.appendChild(el('div', { class: 'score-controls' },
        el('button', { class: 'score-btn', onClick: () => Scoring.point('A') },
          el('span', {}, '+1'),
          el('span', { class: 'sub' }, m.teamA.name),
        ),
        el('button', { class: 'score-btn', onClick: () => Scoring.point('B') },
          el('span', {}, '+1'),
          el('span', { class: 'sub' }, m.teamB.name),
        ),
      ));
    }

    view.appendChild(el('div', { class: 'score-aux' },
      el('button', { class: 'btn btn-secondary btn-sm', html: ICONS.refresh + '<span>Undo</span>', onClick: () => Scoring.undo() }),
      el('button', { class: 'btn btn-secondary btn-sm',
        html: ICONS.bluetooth + `<span>${State.bleConnected ? 'Unpair' : 'Pair BLE'}</span>`,
        onClick: () => State.bleConnected ? BLE.disconnect() : BLE.connect()
      }),
      el('button', { class: 'btn btn-secondary btn-sm', html: ICONS.cast + '<span>Cast display</span>',
        onClick: () => {
          const url = `${location.origin}${location.pathname}?display=true&match=${m.id}`;
          window.open(url, '_blank', 'noopener,noreferrer');
          Toast.show({ title: 'Display opened', msg: 'Cast or mirror this tab to any screen.', type: 'success' });
        }
      }),
      el('button', { class: 'btn btn-secondary btn-sm', html: ICONS.close + '<span>End match</span>', onClick: () => Scoring.reset() }),
    ));

    view.appendChild(el('div', { class: 'card', style: { marginTop: '1rem' } },
      el('div', { class: 'eyebrow' }, 'OFFICIAL RULES · QUICK REFERENCE'),
      el('div', { style: { marginTop: '0.6rem', fontSize: '0.88rem', lineHeight: 1.6, color: 'var(--fg-soft)' } },
        el('p', { style: { margin: '0 0 0.4rem' }, html: '<strong>Serving:</strong> underhand, contact below the waist, diagonal court. First server of a side-out begins on the right.' }),
        el('p', { style: { margin: '0 0 0.4rem' }, html: '<strong>Two-bounce rule:</strong> Receiving team must let the serve bounce; serving team must let the return bounce. After that, volleying is allowed (outside the kitchen).' }),
        el('p', { style: { margin: '0 0 0.4rem' }, html: '<strong>Kitchen:</strong> No volleys from the 7-foot non-volley zone. Your momentum cannot carry you in either.' }),
        el('p', { style: { margin: 0 }, html: '<strong>Scoring:</strong> Traditional — only servers score. Rally — every rally scores. Both win-by-two.' }),
      ),
    ));
  },

  /**
   * Photo picker — small choice sheet:
   *   - Take photo (opens live camera capture UI)
   *   - Choose from gallery (native file picker, accept=image)
   *   - Remove photo (only if one is already set)
   * Calls onCapture(dataUrl) when a new photo is ready,
   * or onCapture('') when the user removes the photo.
   */
  photoPickerSheet({ title = 'Add photo', current = '', onCapture }) {
    const fileInput = el('input', {
      type: 'file',
      accept: 'image/*',
      style: { display: 'none' },
    });
    fileInput.addEventListener('change', async (e) => {
      const f = e.target.files && e.target.files[0];
      e.target.value = '';
      if (!f) return;
      if (!f.type.startsWith('image/')) {
        Toast.show({ title: 'Not an image', type: 'warn' });
        return;
      }
      try {
        const dataUrl = await Camera.snapshotFromFile(f);
        onCapture?.(dataUrl);
        close?.();
        Toast.show({ title: 'Photo updated', type: 'success' });
      } catch (err) {
        Toast.show({ title: 'Could not load image', msg: err.message, type: 'danger' });
      }
    });

    const previewNode = current
      ? el('div', { style: { textAlign: 'center', marginBottom: '1rem' } },
          el('img', { src: current, alt: '',
            style: { width: '120px', height: '120px', borderRadius: '50%', objectFit: 'cover',
              border: '3px solid var(--brass)', boxShadow: 'var(--shadow-md)' } }),
          el('div', { style: { fontSize: '0.78rem', color: 'var(--fg-mute)', marginTop: '0.5rem' } }, 'Current photo'),
        )
      : null;

    const body = el('div', {},
      previewNode,
      el('p', { style: { color: 'var(--fg-soft)', fontSize: '0.88rem', marginTop: previewNode ? 0 : null, textAlign: 'center' } },
        current ? 'Replace the photo or remove it below.' : 'Pick a photo source. Photos appear on the scoreboard and cast display.'),
      fileInput,
    );

    let close;
    const actions = [
      { label: '📷  Take photo', class: 'btn-primary', onClick: async (closeFn) => {
        closeFn();
        const dataUrl = await Camera.open({
          title,
          subtitle: 'Frame your face inside the circle, then tap the shutter.',
        });
        if (dataUrl) {
          onCapture?.(dataUrl);
          Toast.show({ title: 'Photo saved', type: 'success' });
        }
      }},
      { label: '🖼  Choose from gallery', class: 'btn-secondary', onClick: (closeFn) => {
        close = closeFn;
        fileInput.click();
      }},
    ];
    if (current) {
      actions.push({ label: 'Remove photo', class: 'btn-ghost', onClick: (closeFn) => {
        onCapture?.('');
        closeFn();
        Toast.show({ title: 'Photo removed', type: 'info' });
      }});
    }
    actions.push({ label: 'Cancel', class: 'btn-ghost', onClick: (closeFn) => closeFn() });

    Modal.open({ title, body, actions });
  },

  newMatchSheet() {
    let format = 'doubles';
    let scoring = 'traditional';
    let target = 11;
    let matchType = 'single';
    let teamAName = 'Team Alpha', teamBName = 'Team Bravo';
    let teamAPlayers = State.user.name, teamBPlayers = '';
    let teamAPhotos = ['', ''], teamBPhotos = ['', ''];
    let courtId = State.courts[0]?.id || '';

    const body = el('div', {});
    const fmtSelect = el('select', { class: 'select' },
      el('option', { value: 'doubles' }, 'Doubles'),
      el('option', { value: 'singles' }, 'Singles'),

    const matchTypeSelect = el('select', { class: 'select' },

      el('option', { value: 'bo3' }, 'Best of 3 · first to 2 sets'),

      el('option', { value: '15' }, 'Play to 15'),
      el('option', { value: '21' }, 'Play to 21'),
    );
    targetSelect.onchange = () => target = +targetSelect.value;

    const courtSelect = el('select', { class: 'select' },
      el('option', { value: '' }, 'Practice / no court'),
      ...State.courts.map(c => el('option', { value: c.id }, c.name))

    courtSelect.onchange = () => courtId = courtSelect.value;

    const aName = el('input', { class: 'input', value: teamAName });

    const aPlayers = el('input', { class: 'input', value: teamAPlayers, placeholder: 'Player names' });

    const bName = el('input', { class: 'input', value: teamBName });
    bName.oninput = () => teamBName = bName.value;
    const bPlayers = el('input', { class: 'input', value: teamBPlayers, placeholder: 'Player names' });
    bPlayers.oninput = () => teamBPlayers = bPlayers.value;

    // Photo thumb containers — re-rendered when format changes
    const aThumbsContainer = el('div', { class: 'team-photo-thumbs' });
    const bThumbsContainer = el('div', { class: 'team-photo-thumbs' });

    const renderThumb = (photo) => photo
      ? el('img', { src: photo, alt: 'Player photo' })
      : el('span', { html: ICONS.camera });

    function makeThumb(photos, idx, teamLabel) {
      const photo = photos[idx] || '';

        class: 'team-photo-thumb' + (photo ? ' has-photo' : ''),
        'aria-label': `${teamLabel} player ${idx+1} photo`,
      }, renderThumb(photo));
      thumb.onclick = () => Render.photoPickerSheet({
        title: `${teamLabel} · Player ${idx+1}`,

        onCapture: (dataUrl) => {
          photos[idx] = dataUrl || '';
          thumb.innerHTML = '';
          thumb.appendChild(renderThumb(photos[idx]));
          thumb.classList.toggle('has-photo', !!photos[idx]);

    function renderThumbRows() {
      const slots = format === 'doubles' ? 2 : 1;
      aThumbsContainer.innerHTML = '';
      bThumbsContainer.innerHTML = '';
      for (let i = 0; i < slots; i++) {

    renderThumbRows();

    body.append(

        el('div', { class: 'field' }, el('label', {}, 'Target'), targetSelect),
      ),
      el('div', { class: 'field' }, el('label', {}, 'Match type'), matchTypeSelect),
      el('div', { class: 'field' }, el('label', {}, 'Scoring system'), scoringSelect),
      el('div', { class: 'field' }, el('label', {}, 'Court (optional)'), courtSelect),
      el('div', { class: 'card', style: { padding: '1rem', marginBottom: '0.75rem' } },
        el('div', { class: 'eyebrow', style: { marginBottom: '0.4rem' } }, 'TEAM A'),
        el('div', { class: 'team-photo-row' },
          aThumbsContainer,
          el('div', { style: { flex: 1, minWidth: 0 } },
            el('div', { style: { fontSize: '0.75rem', color: 'var(--fg-mute)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '2px' } }, 'Player photos'),
            el('div', { style: { fontSize: '0.8rem', color: 'var(--fg-soft)' } }, 'Tap to take or load from gallery'),
          ),
        ),
        el('div', { class: 'field' }, el('label', {}, 'Name'), aName),
        el('div', { class: 'field', style: { marginBottom: 0 } }, el('label', {}, 'Players'), aPlayers),
      ),
      el('div', { class: 'card', style: { padding: '1rem' } },
        el('div', { class: 'eyebrow', style: { marginBottom: '0.4rem' } }, 'TEAM B'),
        el('div', { class: 'team-photo-row' },
          bThumbsContainer,
          el('div', { style: { flex: 1, minWidth: 0 } },
            el('div', { style: { fontSize: '0.75rem', color: 'var(--fg-mute)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '2px' } }, 'Player photos'),
            el('div', { style: { fontSize: '0.8rem', color: 'var(--fg-soft)' } }, 'Tap to take or load from gallery'),
          ),
        ),
        el('div', { class: 'field' }, el('label', {}, 'Name'), bName),
        el('div', { class: 'field', style: { marginBottom: 0 } }, el('label', {}, 'Players'), bPlayers),
      ),

    Modal.open({
      title: 'New match',
      body,
      actions: [{
        label: 'Start match', class: 'btn-primary',
        onClick: (close) => {
          const court = State.courts.find(c => c.id === courtId);
          const slots = format === 'doubles' ? 2 : 1;
          Scoring.newMatch({
            teamA: { name: teamAName, players: teamAPlayers, photos: teamAPhotos.slice(0, slots).filter(Boolean) },
            teamB: { name: teamBName, players: teamBPlayers, photos: teamBPhotos.slice(0, slots).filter(Boolean) },
            format, scoring, target, matchType, courtName: court?.name || '',
          });
          close();
          Render.current();
          Toast.show({ title: 'Match started', msg: `${teamAName} vs ${teamBName}`, type: 'success' });
        }
      }]
    });
  },

  /* ===== CHAT ===== */
  viewChat(view) {
    const wrap = el('div', { class: 'chat-wrap' });
    const messages = el('div', { class: 'chat-messages', id: 'chat-messages' });

    if (!State.chatHistory.length) {
      State.chatHistory.push({
        role: 'ai',
        content: `Hi ${State.user.name.split(' ')[0]} 👋 I'm your club assistant. Ask me about **rules**, **bookings**, **scoring**, or just **coaching tips**. What would you like to know?`,
      });
    }
    State.chatHistory.forEach(m => messages.appendChild(this.chatMsgNode(m)));

    const suggestions = el('div', { class: 'chat-suggestions' },
      ...['What are the kitchen rules?', 'Book a court for tomorrow', 'Give me a coaching tip', 'How does rally scoring work?'].map(s =>
        el('button', { class: 'chat-suggestion', onClick: () => sendMsg(s) }, s)
      )
    );

    const input = el('textarea', { class: 'chat-input', placeholder: 'Ask anything…', rows: '1' });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(120, input.scrollHeight) + 'px';
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg(input.value);
      }
    });

    const sendBtn = el('button', { class: 'chat-send', 'aria-label': 'Send', html: ICONS.send });

    async function sendMsg(text) {
      const value = (text || input.value).trim();
      if (!value) return;
      input.value = ''; input.style.height = 'auto';
      const userMsg = { role: 'user', content: value };
      State.chatHistory.push(userMsg);
      messages.appendChild(Render.chatMsgNode(userMsg));
      messages.scrollTop = messages.scrollHeight;

      const typing = el('div', { class: 'msg ai' }, el('span', { class: 'typing' }, el('span'), el('span'), el('span')));
      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;

      try {
        const ctx = {
          user: State.user,
          bookings: State.bookings,
          score: State.currentMatch,
          today: ymd(new Date()),
        };
        const res = await API.call('chat', { message: value, context: ctx });
        typing.remove();
        const reply = (res?.reply || 'Sorry, I had trouble responding. Try again?').trim();
        const aiMsg = { role: 'ai', content: reply };
        State.chatHistory.push(aiMsg);
        messages.appendChild(Render.chatMsgNode(aiMsg));
        messages.scrollTop = messages.scrollHeight;
      } catch (e) {
        typing.remove();
        const aiMsg = { role: 'ai', content: "I'm having trouble reaching the server. Try again shortly." };
        State.chatHistory.push(aiMsg);
        messages.appendChild(Render.chatMsgNode(aiMsg));
      }
    }
    sendBtn.onclick = () => sendMsg();

    const inputWrap = el('div', { class: 'chat-input-wrap' }, input, sendBtn);

    wrap.append(messages, suggestions, inputWrap);
    view.appendChild(wrap);

    requestAnimationFrame(() => { messages.scrollTop = messages.scrollHeight; input.focus(); });
  },

  chatMsgNode(m) {
    const html = sanitize(m.content).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    return el('div', { class: `msg ${m.role}`, html });
  },

  /* ===== PROFILE ===== */
  viewProfile(view) {
    const u = State.user;
    const myBookings = State.bookings.filter(b => b.owner === u.email);
    const myPayments = State.payments.filter(p => p.owner === u.email);
    const totalSpent = myPayments.filter(p => p.status === 'paid').reduce((s, p) => s + (p.amount || 0), 0);

    view.appendChild(el('div', { class: 'card feature' },
      el('div', { style: { position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', gap: '1rem' } },
        el('div', { style: { width: '64px', height: '64px', borderRadius: '50%', background: 'var(--brass)',
          color: 'var(--court-green-deep)', display: 'grid', placeItems: 'center', fontFamily: 'var(--font-display)',
          fontSize: '1.6rem', fontWeight: 600 } }, u.name.charAt(0).toUpperCase()),
        el('div', { style: { flex: 1, minWidth: 0 } },
          el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '1.4rem', fontWeight: 500 } }, u.name),
          el('div', { style: { fontSize: '0.85rem', opacity: 0.8 } }, u.email),
          el('div', { style: { marginTop: '0.4rem' } },
            el('span', { class: 'chip', style: { background: 'rgba(232,182,71,0.2)', color: 'var(--brass)', borderColor: 'transparent' } },
              u.role.toUpperCase())
          ),
        ),
      )
    ));

    view.appendChild(el('div', { class: 'stats' },
      el('div', { class: 'stat' },
        el('div', { class: 'stat-value' }, String(myBookings.length)),
        el('div', { class: 'stat-label' }, 'Total bookings')),
      el('div', { class: 'stat' },
        el('div', { class: 'stat-value' }, fmtMoney(totalSpent).replace(/\.\d+/, '')),
        el('div', { class: 'stat-label' }, 'Total spent')),
      el('div', { class: 'stat' },
        el('div', { class: 'stat-value' }, String(State.scores.filter(s => (s.teamA.players||'').includes(u.name) || (s.teamB.players||'').includes(u.name)).length)),
        el('div', { class: 'stat-label' }, 'Matches played')),
    ));

    view.appendChild(el('div', { class: 'section-header' }, el('h2', {}, 'Payments')));
    const pmtCard = el('div', { class: 'card' });
    if (!myPayments.length) {
      pmtCard.appendChild(this.emptyState('No payments yet.'));
    } else {
      myPayments.slice().reverse().forEach(p => {
        const b = State.bookings.find(x => x.id === p.bookingId);
        pmtCard.appendChild(el('div', { class: 'row' },
          el('div', { class: 'left' },
            el('strong', {}, b ? `${b.courtName} · ${b.time}` : 'Booking'),
            el('small', {}, `${b ? fmtDate(b.date) : '—'} · ${fmtMoney(p.amount)}`),
          ),
          p.status === 'pending'
            ? el('button', { class: 'btn btn-sm btn-primary', onClick: () => Render.paymentSheet(p) }, 'Pay now')
            : el('span', { class: 'chip success' }, 'Paid'),
        ));
      });
    }
    view.appendChild(pmtCard);

    view.appendChild(el('div', { class: 'section-header' }, el('h2', {}, 'Settings')));
    const settings = el('div', { class: 'stack' },
      this.settingRow({
        title: 'Push notifications',
        desc: 'Booking reminders and match alerts',
        right: (() => {
          const sw = el('div', { class: 'switch', onClick: async (e) => {
            const granted = await Notify.requestPermission();
            e.currentTarget.classList.toggle('on', granted);
            if (granted) Toast.show({ title: 'Notifications on', type: 'success' });
          }});
          if (typeof Notification !== 'undefined' && Notification.permission === 'granted') sw.classList.add('on');
          return sw;
        })(),
      }),
      this.settingRow({
        title: 'Dark mode',
        desc: 'Reduces eye strain in low light',
        right: (() => {
          const sw = el('div', { class: 'switch' + (State.theme === 'dark' ? ' on' : ''), onClick: () => Theme.toggle() });
          return sw;
        })(),
      }),
      this.settingRow({
        title: 'Bluetooth scoring',
        desc: 'Connect a button remote for hands-free scoring',
        right: el('button', { class: 'btn btn-sm btn-secondary', onClick: () => State.bleConnected ? BLE.disconnect() : BLE.connect() },
          State.bleConnected ? 'Disconnect' : 'Pair'),
      }),
      this.settingRow({
        title: 'Backend URL',
        desc: CONFIG.API_URL ? `Connected: ${CONFIG.API_URL.slice(0,40)}…` : 'Using local mock data (no backend set)',
        right: el('button', { class: 'btn btn-sm btn-secondary', onClick: () => Render.apiUrlSheet() }, 'Configure'),
      }),
      u.role === 'admin' ? this.settingRow({
        title: 'Admin dashboard',
        desc: 'Manage courts, users, and logs',
        right: el('button', { class: 'btn btn-sm btn-primary', onClick: () => { State.route = 'admin'; Render.current(); } }, 'Open'),
      }) : null,
      this.settingRow({
        title: 'Sign out',
        desc: 'Clear session and return to login',
        right: el('button', { class: 'btn btn-sm btn-ghost', onClick: () => Auth.signOut() }, 'Sign out'),
      }),
    );
    view.appendChild(settings);

    view.appendChild(el('div', { class: 'powered-by powered-by-profile' },
      el('span', {}, 'Powered by'),
      el('span', { class: 'powered-mark' }, 'CYRABELL'),
    ));
  },

  settingRow({ title, desc, right }) {
    if (!title) return null;
    return el('div', { class: 'row' },
      el('div', { class: 'left' }, el('strong', {}, title), el('small', {}, desc)),
      right,
    );
  },

  apiUrlSheet() {
    let url = CONFIG.API_URL;
    const input = el('input', { class: 'input', value: url, placeholder: 'https://script.google.com/macros/s/.../exec' });
    input.oninput = () => url = input.value.trim();
    Modal.open({
      title: 'Backend URL',
      body: el('div', {},
        el('p', { style: { color: 'var(--fg-soft)', fontSize: '0.88rem', marginTop: 0 } },
          'Paste your deployed Google Apps Script web app URL. Leave blank to use local mock data.'),
        el('div', { class: 'field' }, el('label', {}, 'API URL'), input),
      ),
      actions: [
        { label: 'Save', class: 'btn-primary', onClick: (close) => {
          if (url) localStorage.setItem('dink.apiUrl', url);
          else localStorage.removeItem('dink.apiUrl');
          CONFIG.API_URL = url;
          close();
          Toast.show({ title: 'Backend updated', msg: 'Reloading…', type: 'success' });
          setTimeout(() => location.reload(), 700);
        }},
        { label: 'Cancel', class: 'btn-ghost', onClick: (close) => close() },
      ],
    });
  },

  paymentSheet(payment) {
    let method = 'card';
    const methodGroup = el('div', { class: 'grid-2', style: { marginBottom: '1rem' } });
    const update = () => {
      methodGroup.childNodes.forEach((n, i) => {
        n.style.border = ['card','paypal'][i] === method ? '2px solid var(--accent)' : '1px solid var(--line)';
      });
    };
    ['card', 'paypal'].forEach(m => {
      const b = el('button', {
        class: 'card', style: {
          padding: '1rem', cursor: 'pointer', textAlign: 'center',
          border: method === m ? '2px solid var(--accent)' : '1px solid var(--line)',
        },
        onClick: () => { method = m; update(); }
      },
        el('div', { html: ICONS.card, style: { width: '32px', height: '32px', margin: '0 auto 0.4rem' } }),
        el('div', { style: { fontWeight: 600 } }, m === 'card' ? 'Card / Stripe' : 'PayPal'),
        el('div', { style: { fontSize: '0.75rem', color: 'var(--fg-mute)', marginTop: '2px' } }, m === 'card' ? 'Visa, Master, JCB' : 'Web checkout'),
      );
      methodGroup.appendChild(b);
    });

    Modal.open({
      title: `Pay ${fmtMoney(payment.amount)}`,
      body: el('div', {},
        el('p', { style: { color: 'var(--fg-soft)', fontSize: '0.88rem' } },
          'Mock checkout — replace with real Stripe/PayPal in Code.gs. Secure token issued by Apps Script.'),
        methodGroup,
        el('div', { class: 'card', style: { background: 'var(--bg-sunk)', padding: '1rem' } },
          el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '0.9rem' } }, el('span', {}, 'Court rental'), el('span', {}, fmtMoney(payment.amount))),
          el('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '0.9rem', marginTop: '0.3rem' } }, el('span', {}, 'Service fee'), el('span', {}, fmtMoney(0))),
          el('div', { style: { display: 'flex', justifyContent: 'space-between', fontWeight: 700, marginTop: '0.5rem', paddingTop: '0.5rem', borderTop: '1px solid var(--line)' } }, el('span', {}, 'Total'), el('span', {}, fmtMoney(payment.amount))),
        ),
      ),
      actions: [{
        label: `Pay ${fmtMoney(payment.amount)}`,
        class: 'btn-primary',
        onClick: async (close) => {
          const token = `tok_${uid()}_${Date.now()}`;
          await API.call('payBooking', { bookingId: payment.bookingId, method, token });
          const idx = State.payments.findIndex(x => x.id === payment.id);
          if (idx >= 0) State.payments[idx] = { ...payment, status: 'paid', method, paidAt: Date.now() };
          Toast.show({ title: 'Payment successful', msg: `${fmtMoney(payment.amount)} via ${method}`, type: 'success' });
          Notify.push({ title: 'Payment received', body: `${fmtMoney(payment.amount)} confirmed.` });
          close(); Render.current();
        }
      }]
    });
  },

  notificationsSheet() {
    const list = el('div', { class: 'stack' });
    if (!State.notifications.length) {
      list.appendChild(this.emptyState('No notifications yet.'));
    } else {
      State.notifications.forEach(n => {
        list.appendChild(el('div', { class: 'row', onClick: () => API.call('markRead', { id: n.id }) },
          el('div', { class: 'left' },
            el('strong', {}, n.title),
            el('small', {}, `${n.body || ''} · ${new Date(n.createdAt).toLocaleString()}`),
          ),
          !n.read ? el('span', { class: 'chip accent' }, 'new') : null,
        ));
      });
    }
    Modal.open({ title: 'Notifications', body: list });
  },

  /* ===== ADMIN ===== */
  viewAdmin(view) {
    if (State.user.role !== 'admin') {
      view.appendChild(el('div', { class: 'card' }, this.emptyState('Admin access required. Sign in with an email containing "admin" to test.')));
      return;
    }
    let tab = 'overview';
    const tabBar = el('div', { class: 'tabs' });
    const content = el('div', {});
    const tabs = [
      ['overview', 'Overview'],
      ['bookings', 'Bookings'],
      ['payments', 'Payments'],
      ['logs', 'Logs'],
    ];
    function setTab(t) {
      tab = t;
      $$('.tab', tabBar).forEach(x => x.classList.toggle('active', x.dataset.tab === t));
      content.innerHTML = '';
      content.appendChild(renderTab());
    }
    tabs.forEach(([id, label]) => tabBar.appendChild(el('button', { class: 'tab' + (tab === id ? ' active' : ''), 'data-tab': id, onClick: () => setTab(id) }, label)));
    function renderTab() {
      if (tab === 'overview') {
        const revenue = State.payments.filter(p => p.status === 'paid').reduce((s, p) => s + p.amount, 0);
        const pending = State.payments.filter(p => p.status === 'pending').reduce((s, p) => s + p.amount, 0);
        return el('div', { class: 'admin-grid' },
          el('div', { class: 'card' }, el('div', { class: 'eyebrow' }, 'Revenue (paid)'), el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '2rem', fontWeight: 600, color: 'var(--accent)' } }, fmtMoney(revenue))),
          el('div', { class: 'card' }, el('div', { class: 'eyebrow' }, 'Pending'), el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '2rem', fontWeight: 600, color: 'var(--clay)' } }, fmtMoney(pending))),
          el('div', { class: 'card' }, el('div', { class: 'eyebrow' }, 'Total bookings'), el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '2rem', fontWeight: 600 } }, String(State.bookings.length))),
          el('div', { class: 'card' }, el('div', { class: 'eyebrow' }, 'Active courts'), el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '2rem', fontWeight: 600 } }, String(State.courts.filter(c => c.active).length))),
        );
      }
      if (tab === 'bookings') {
        const t = el('table', { class: 'table' },
          el('thead', {}, el('tr', {}, el('th', {}, 'Date'), el('th', {}, 'Time'), el('th', {}, 'Court'), el('th', {}, 'Owner'))),
          el('tbody', {}, ...State.bookings.slice().reverse().slice(0, 50).map(b =>
            el('tr', {}, el('td', {}, fmtDate(b.date, { year: undefined })), el('td', {}, b.time), el('td', {}, b.courtName), el('td', {}, sanitize(b.owner))),
          )),
        );
        return el('div', { class: 'card', style: { overflowX: 'auto' } }, t);
      }
      if (tab === 'payments') {
        const t = el('table', { class: 'table' },
          el('thead', {}, el('tr', {}, el('th', {}, 'Owner'), el('th', {}, 'Amount'), el('th', {}, 'Method'), el('th', {}, 'Status'))),
          el('tbody', {}, ...State.payments.slice().reverse().slice(0, 50).map(p =>
            el('tr', {}, el('td', {}, sanitize(p.owner)), el('td', {}, fmtMoney(p.amount)), el('td', {}, p.method || '—'),
              el('td', {}, el('span', { class: 'chip ' + (p.status === 'paid' ? 'success' : 'warn') }, p.status))),
          )),
        );
        return el('div', { class: 'card', style: { overflowX: 'auto' } }, t);
      }
      if (tab === 'logs') {
        return el('div', { class: 'card' }, ...State.notifications.slice(0, 30).map(n =>
          el('div', { class: 'row' },
            el('div', { class: 'left' }, el('strong', {}, n.title), el('small', {}, `${new Date(n.createdAt).toLocaleString()} · ${n.recipient || 'all'}`))
          )
        ));
      }
    }
    view.appendChild(el('h2', { style: { marginBottom: '1rem' } }, 'Admin Dashboard'));
    view.appendChild(tabBar);
    view.appendChild(content);
    setTab('overview');
  },

  /* ===== DISPLAY MODE ===== */
  async displayBoard() {
    const root = $('#root');
    root.innerHTML = '';
    const board = el('div', { class: 'display-board' });

    const update = (m) => {
      board.innerHTML = '';
      if (!m) {
        board.appendChild(el('div', { class: 'ds-meta' },
          el('span', {}, 'DINK & DRIVE LIVE'),
          el('span', {}, new Date().toLocaleTimeString()),
        ));
        board.appendChild(el('div', { class: 'ds-grid' },
          el('div', { class: 'ds-team' }, el('div', { class: 'ds-name', style: { opacity: 0.6 } }, 'Waiting for match…')),
        ));
        board.appendChild(el('div', { class: 'ds-footer' },
          el('span', {}, 'No active match'),
          el('span', { class: 'ds-brand' },
            el('span', {}, 'Dink & Drive'),
            el('span', { class: 'ds-powered' }, 'Powered by CYRABELL'),
          ),
        ));
        return;
      }
      const matchTypeLabel = m.matchType === 'bo5' ? 'BEST OF 5'
        : m.matchType === 'bo3' ? 'BEST OF 3'
        : 'SINGLE MATCH';
      const seriesPart = m.matchType !== 'single'
        ? ` · SET ${m.currentSet} · SERIES ${m.teamA.setsWon}–${m.teamB.setsWon}`
        : '';
      board.appendChild(el('div', { class: 'ds-meta' },
        el('span', {}, `${m.format.toUpperCase()} · ${matchTypeLabel} · TO ${m.target}${seriesPart}`),
        el('span', {}, m.courtName || 'LIVE'),
      ));
      const totalSets = m.matchType === 'bo5' ? 5 : (m.matchType === 'bo3' ? 3 : 1);
      const teamRow = (t, side) => {
        const photos = Array.isArray(t.photos) ? t.photos.filter(Boolean)
                     : (t.photo ? [t.photo] : []);  // backward-compat
        const slots = m.format === 'doubles' ? 2 : 1;
        const avatars = [];
        const players = (t.players || '').split(/[,/&]| and /).map(s => s.trim()).filter(Boolean);
        for (let i = 0; i < slots; i++) {
          const photo = photos[i];
          avatars.push(el('div', { class: 'ds-avatar' },
            photo
              ? el('img', { src: photo, alt: '' })
              : el('span', {}, (players[i] || t.name || '?').charAt(0).toUpperCase()),
          ));
        }
        // Set pips
        const pips = [];
        if (m.matchType !== 'single') {
          for (let i = 0; i < totalSets; i++) {
            pips.push(el('div', { class: 'ds-set-pip' + (i < (t.setsWon || 0) ? ' won' : '') }));
          }
        }
        return el('div', { class: 'ds-team' + (m.serving === side ? ' serving' : '') },
          el('div', { class: 'ds-side' },
            el('div', { class: 'ds-avatars' }, ...avatars),
            el('div', { style: { minWidth: 0 } },
              el('div', { class: 'ds-name' }, t.name),
              el('div', { class: 'ds-players' }, t.players),
              pips.length ? el('div', { class: 'ds-set-pips' }, ...pips) : null,
            ),
          ),
          el('div', { class: 'ds-score' }, String(t.score)),
        );
      };
      board.appendChild(el('div', { class: 'ds-grid' }, teamRow(m.teamA, 'A'), teamRow(m.teamB, 'B')));

      // Set history (only for bo3/bo5)
      if (m.matchType !== 'single' && m.sets.length) {
        const setNodes = m.sets.map((s, i) => el('div', { class: 'ds-set' },
          el('div', { class: 'ds-set-label' }, `S${i+1}`),
          el('div', { class: 'ds-set-score' }, `${s.a}–${s.b}`),
        ));
        board.appendChild(el('div', { class: 'ds-set-history', style: { justifyContent: 'center', padding: '1vh 0' } }, ...setNodes));
      }

      board.appendChild(el('div', { class: 'ds-footer' },
        el('span', {}, m.winner
          ? `WINNER · ${m[`team${m.winner}`].name}${m.matchType !== 'single' ? ` · ${m.teamA.setsWon}–${m.teamB.setsWon}` : ''}`
          : `SERVING · ${m.serving === 'A' ? m.teamA.name : m.teamB.name}`),
        el('span', { class: 'ds-brand' },
          el('span', {}, 'Dink & Drive'),
          el('span', { class: 'ds-powered' }, 'Powered by CYRABELL'),
        ),
      ));
    };
    root.appendChild(board);
    update(null);

    const poll = async () => {
      try {
        let match = null;
        if (State.displayMatchId) {
          match = await API.call('getLiveScore', { id: State.displayMatchId });
        } else {
          const all = await API.call('getScores');
          match = (all || []).filter(s => !s.winner).sort((a,b) => (b.startedAt||0) - (a.startedAt||0))[0]
               || (all || []).sort((a,b) => (b.startedAt||0) - (a.startedAt||0))[0];
        }
        update(match);
      } catch (e) {}
    };
    poll();
    setInterval(poll, CONFIG.POLL_INTERVAL_MS);
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch {}
  },
};

/* -------------------------------------------------------------
   iCAL EXPORT
   ------------------------------------------------------------- */
function exportICal(bookings, label) {
  if (!bookings.length) {
    Toast.show({ title: 'Nothing to export', type: 'warn' });
    return;
  }
  const pad = n => String(n).padStart(2, '0');
  const toICS = (date, time, durationHours) => {
    const start = new Date(`${date}T${time}:00`);
    const end = new Date(start.getTime() + (durationHours || 1) * 3600 * 1000);
    const fmt = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
    return { start: fmt(start), end: fmt(end) };
  };
  const lines = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Dink & Drive//Pickleball//EN', 'CALSCALE:GREGORIAN',
  ];
  bookings.forEach(b => {
    const { start, end } = toICS(b.date, b.time, b.duration);
    lines.push('BEGIN:VEVENT',
      `UID:${b.id}@dinkdrive.club`,
      `DTSTAMP:${start}`,
      `DTSTART:${start}`,
      `DTEND:${end}`,
      `SUMMARY:Pickleball · ${b.courtName}`,
      `DESCRIPTION:Players: ${b.players || b.owner}`,
      `LOCATION:${CONFIG.CLUB_NAME}, ${CONFIG.CLUB_CITY}`,
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dink-drive-${label}.ics`;
  a.click();
  Toast.show({ title: 'Calendar exported', msg: `${bookings.length} events`, type: 'success' });
}

/* -------------------------------------------------------------
   SERVICE WORKER (PWA)
   ------------------------------------------------------------- */
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
    const CACHE = 'dink-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      const req = e.request;
      if (req.method !== 'GET') return;
      e.respondWith(
        caches.open(CACHE).then(async cache => {
          const cached = await cache.match(req);
          const fetchPromise = fetch(req).then(res => {
            if (res && res.status === 200 && res.type === 'basic') cache.put(req, res.clone());
            return res;
          }).catch(() => cached);
          return cached || fetchPromise;
        })
      );
    });
  `;
  try {
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(() => {});
  } catch {}
}

/* -------------------------------------------------------------
   BOOT
   ------------------------------------------------------------- */
(async function boot() {
  Theme.apply();
  Auth.restore();
  await Render.app();
  registerSW();

  if (State.user) {
    try {
      const scores = await API.call('getScores');
      State.scores = scores || [];
      const active = (scores || []).find(s => !s.winner && (Date.now() - (s.startedAt || 0)) < 6 * 3600 * 1000);
      if (active && !State.currentMatch) State.currentMatch = active;
    } catch {}
  }
})();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !State.isDisplayMode && State.user) {
    loadAll().then(() => Render.current()).catch(()=>{});
  }
});
